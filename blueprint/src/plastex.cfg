[general]
renderer=HTML5
copy-theme-extras=yes
plugins=plastexdepgraph plastexshowmore leanblueprint

[document]
toc-depth=3
toc-non-files=True

[files]
directory=../web/
split-level=1

[html5]
localtoc-level=2
extra-css=extra_styles.css
mathjax-dollars=False

[leanblueprint]
github=https://github.com/faabian/algebraic-combinatorics
mathlib=https://leanprover-community.github.io/mathlib4_docs
project=https://faabian.github.io/algebraic-combinatorics/docs
